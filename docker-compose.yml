services:

  # ── Neo4j graph database ────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: infragraph-neo4j
    ports:
      - "7474:7474"   # Neo4j browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-password}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - infragraph_net

  # ── Flask backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infragraph-backend
    ports:
      - "5001:5000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev-secret-key}
      SEED_ON_START: ${SEED_ON_START:-true}
    volumes:
      # Mount seed data and execution scripts read-only so the container
      # can run seed_loader.py without baking them into the image.
      - ./seed:/app/seed:ro
      - ./execution:/app/execution:ro
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - infragraph_net

  # ── React frontend (nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""  # Empty = use relative paths; nginx proxies /parse, /graph
    container_name: infragraph-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - infragraph_net

# ── Volumes ─────────────────────────────────────────────────────────
volumes:
  neo4j_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────
networks:
  infragraph_net:
    driver: bridge
