# seed/seed-k8s.yaml — InfraGraph demo Kubernetes application
#
# Multi-document YAML showing the full K8s dependency chain:
#   Service/default/infragraph      → Deployment/default/infragraph  (selector match)
#   Deployment/default/infragraph   → ConfigMap/default/infragraph-config  (envFrom + volume)
#   Deployment/default/infragraph   → Secret/default/infragraph-secrets    (envFrom)
#   Ingress/default/infragraph      → Service/default/infragraph            (backend)

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: infragraph-config
  namespace: default
  labels:
    app: infragraph
data:
  APP_ENV: production
  LOG_LEVEL: info
  NEO4J_HOST: neo4j
  NEO4J_PORT: "7687"
  FRONTEND_PORT: "3000"
  BACKEND_PORT: "5000"

---
apiVersion: v1
kind: Secret
metadata:
  name: infragraph-secrets
  namespace: default
  labels:
    app: infragraph
type: Opaque
data:
  NEO4J_PASSWORD: cGFzc3dvcmQ=
  FLASK_SECRET_KEY: Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24=

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infragraph
  namespace: default
  labels:
    app: infragraph
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infragraph
  template:
    metadata:
      labels:
        app: infragraph
        component: backend
    spec:
      containers:
        - name: backend
          image: infragraph/backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: infragraph-config
            - secretRef:
                name: infragraph-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config-vol
          configMap:
            name: infragraph-config

---
apiVersion: v1
kind: Service
metadata:
  name: infragraph
  namespace: default
  labels:
    app: infragraph
spec:
  type: ClusterIP
  selector:
    app: infragraph
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infragraph
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: infragraph.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infragraph
                port:
                  number: 80
