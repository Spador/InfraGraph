name: InfraGraph CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────────────
  # Must pass before test and build are allowed to run.
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python lint (backend + execution scripts)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python
        run: |
          flake8 backend/ execution/ \
            --max-line-length=120 \
            --exclude=__pycache__,*.pyc,.venv,venv,.tmp

      # TypeScript + ESLint (frontend)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npx eslint src/ --ext .ts,.tsx --max-warnings=0

      - name: TypeScript type check
        run: cd frontend && npx tsc --noEmit

  # ── Job 2: Test ──────────────────────────────────────────────────────
  # Runs after lint passes. Pure Python — no live Neo4j required.
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        run: pytest backend/tests/ -v --tb=short

  # ── Job 3: Build ─────────────────────────────────────────────────────
  # Runs after lint passes (parallel with test).
  # Validates all Dockerfiles build without error — no push, no deploy.
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose build
